<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الشرطة | تسجيل الدخول</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-shield">🛡️</div>
    <h1>نظام إدارة الشرطة</h1>
    <p>سجّل دخولك عبر حساب ديسكورد للوصول إلى لوحة العمليات</p>

    <a href="#" id="discordLoginBtn" class="discord-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.01c.12.1.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.893.076.076 0 0 0-.04.106c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.001-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.028z"/></svg>
      الدخول عبر ديسكورد
    </a>

    <div id="loginError" class="login-error hidden"></div>
    <div class="login-foot">SECURE ACCESS // DEPT-AUTH-01</div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  document.getElementById('discordLoginBtn').href = `${API_URL}/auth/discord`;

  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  if (error) {
    const messages = {
      no_code: 'لم يتم استلام كود الدخول، حاول مرة أخرى.',
      not_member: 'لازم تكون عضو في سيرفر الديسكورد الخاص بالقسم.',
      oauth_failed: 'فشل تسجيل الدخول، حاول مرة أخرى.',
    };
    const box = document.getElementById('loginError');
    box.textContent = messages[error] || 'صار خطأ غير متوقع.';
    box.classList.remove('hidden');
  }
</script>
</body>
</html>
